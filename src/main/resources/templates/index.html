<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Force Buy | 메인')}"></head>
<body class="bg-[#f5f6f9] text-gray-900 font-sans antialiased min-h-screen">

<div th:replace="~{fragments/header :: header}"></div>

<!-- [포스딜 캐러셀] 메인 (COM-MAIN-01 #9) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<style>
    .forcedeal-swiper { overflow: hidden; }
    .forcedeal-swiper .swiper-slide { width: 88%; transition: opacity .3s; opacity: .55; }
    .forcedeal-swiper .swiper-slide-active { opacity: 1; }
    @media (min-width: 768px) { .forcedeal-swiper .swiper-slide { width: 46%; } }
    .fd-tint-0 { background: #F4F1EC; }
    .fd-tint-1 { background: #EAF0F4; }
    .fd-tint-2 { background: #F4EDEA; }
    .fd-tint-3 { background: #ECF1EC; }
</style>
<section class="w-full bg-white border-b border-gray-100">
    <div class="max-w-screen-wide mx-auto px-4 py-6">
        <div class="swiper forcedeal-swiper">
            <div class="swiper-wrapper">
                <a th:each="g, st : ${groupBuys}" th:href="@{/group-buys/{seq}(seq=${g.seq})}"
                   th:classappend="${'fd-tint-' + (st.index % 4)}"
                   class="swiper-slide group block rounded-xl overflow-hidden">
                    <div class="flex items-stretch h-52">
                        <div class="flex-1 p-6 flex flex-col justify-center min-w-0">
                            <span class="self-start inline-flex items-center gap-1 bg-brand text-white text-[11px] font-bold px-2 py-0.5 rounded mb-2">
                                <i data-lucide="zap" class="w-3 h-3 fill-white"></i> 포스딜
                            </span>
                            <p class="text-xl md:text-2xl font-extrabold leading-tight text-gray-900">
                                지금 <span class="text-brand" th:text="${g.discountRate} + '%'">35%</span> 할인중!
                            </p>
                            <p class="mt-1 text-sm text-gray-600 line-clamp-1"
                               th:text="${#strings.replace(g.name, '[공구] ', '')}">상품명</p>
                            <span class="self-start mt-3 inline-flex items-center gap-1 bg-brand-light text-brand text-xs font-bold px-2 py-1 rounded">
                                <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                                <span th:text="${g.remainText}">2일 14:30:00</span>
                            </span>
                        </div>
                        <div class="w-40 md:w-52 shrink-0 overflow-hidden">
                            <img th:src="${g.image}" alt=""
                                 class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</section>

<main class="pb-20">

    <!-- [핫딜 상품] 회색 밴드 -->
    <section class="bg-[#f5f6f9] py-12">
      <div class="max-w-screen-wide mx-auto px-4 space-y-4">
        <div class="flex items-end justify-between border-b border-gray-200 pb-3">
            <h3 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                <span class="w-1.5 h-5 bg-brand"></span> 🔥 오늘만 이 가격! 핫딜 상품
            </h3>
            <a th:href="@{/products(showHotDealsOnly=true)}" class="text-xs font-bold text-gray-500 hover:text-brand">전체보기 &gt;</a>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <!-- 상품 카드 (th:each) -->
            <a th:each="p : ${hotdeals}" th:href="@{/products/{seq}(seq=${p.seq})}"
               class="bg-white p-2 flex flex-col justify-between group cursor-pointer border border-gray-100 hover:border-brand transition-colors">
                <div class="aspect-square bg-gray-50 relative overflow-hidden">
                    <img th:src="${p.image}" alt="" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
                </div>
                <div class="pt-3 space-y-1.5">
                    <h4 th:text="${p.name}" class="text-xs text-gray-700 line-clamp-2 leading-normal group-hover:text-brand group-hover:underline">상품명</h4>
                    <div>
                        <div th:if="${p.originalPrice > 0}" th:text="${#numbers.formatInteger(p.originalPrice, 0, 'COMMA')} + '원'"
                             class="text-[11px] text-gray-400 line-through">21,900원</div>
                        <div class="flex items-baseline gap-1">
                            <span th:if="${p.discountRate > 0}" th:text="${p.discountRate} + '%'" class="text-brand font-black text-sm">32%</span>
                            <span th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')}" class="text-brand font-extrabold text-base">14,900</span>
                            <span class="text-xs font-bold">원</span>
                        </div>
                        <div class="mt-1 flex items-center gap-1 text-[10px] text-gray-400">
                            <span class="text-amber-500 font-bold" th:text="${p.rating}">★★★★★</span>
                            <span th:text="'(' + ${#numbers.formatInteger(p.reviewCount, 0, 'COMMA')} + ')'">(4,215)</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
      </div>
    </section>

    <!-- [인기 상품] 흰색 밴드 -->
    <section class="bg-white py-12">
      <div class="max-w-screen-wide mx-auto px-4 space-y-4">
        <div class="flex items-end justify-between border-b border-gray-200 pb-3">
            <h3 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                <span class="w-1.5 h-5 bg-slate-900"></span> 📊 실시간 인기 베스트 상품
            </h3>
            <a th:href="@{/products}" class="text-xs font-bold text-gray-500 hover:text-brand">전체보기 &gt;</a>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            <a th:each="p, stat : ${populars}" th:href="@{/products/{seq}(seq=${p.seq})}"
               class="bg-white p-2 flex flex-col justify-between group cursor-pointer border border-gray-100 hover:border-brand transition-colors">
                <div class="aspect-square bg-gray-50 relative overflow-hidden">
                    <img th:src="${p.image}" alt="" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
                    <!-- 좌상단: 순위 번호 및 살짝 떨어진 HOT 배지 -->
                    <div class="absolute top-0 left-0 flex items-center gap-1.5">
                        <span th:text="${stat.count}" class="bg-slate-900 text-white text-[11px] font-bold px-2 py-0.5">1</span>
                        <span th:if="${p.hot}" class="bg-brand text-white text-[9px] font-black px-1.5 py-0.5 rounded-sm shadow-sm animate-pulse">HOT</span>
                    </div>
                    
                    <!-- 우상단: 순위 변동 배지 (배경색 없이 기호 및 글자색만 표시) -->
                    <span th:if="${p.rankChange != null}" 
                          th:text="${p.rankChange}"
                          th:class="${p.rankChange == 'NEW'} ? 'absolute top-1 right-2 text-emerald-500 font-black text-[10px]' :
                                    (${#strings.startsWith(p.rankChange, '▲')} ? 'absolute top-1 right-2 text-red-500 font-extrabold text-[10px]' :
                                    (${#strings.startsWith(p.rankChange, '▼')} ? 'absolute top-1 right-2 text-blue-500 font-extrabold text-[10px]' :
                                    'absolute top-1 right-2 text-slate-400 font-extrabold text-[10px]'))">NEW</span>
                </div>
                <div class="pt-2 space-y-1">
                    <h4 th:text="${p.name}" class="text-xs text-gray-700 font-normal line-clamp-2 group-hover:underline">상품명</h4>
                    <p th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')} + '원'" class="text-sm font-black text-gray-900">549,000원</p>
                    <div class="text-[10px] text-amber-500 font-bold">
                        <span th:text="${p.rating}">★★★★★</span>
                        <span class="text-gray-400 font-normal" th:text="'(' + ${#numbers.formatInteger(p.reviewCount, 0, 'COMMA')} + ')'">(3,104)</span>
                    </div>
                </div>
            </a>
        </div>
      </div>
    </section>

    <!-- [AI 추천] 회색 밴드 -->
    <section class="bg-[#f5f6f9] py-12" th:if="${recommendations != null and !recommendations.isEmpty()}">
      <div class="max-w-screen-wide mx-auto px-4 space-y-4">
        <div class="flex items-end justify-between border-b border-gray-200 pb-3">
            <h3 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                <span class="w-1.5 h-5 bg-brand"></span> ✨ 구글 AI 맞춤 추천 상품
            </h3>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            <a th:each="p, stat : ${recommendations}" th:if="${stat.index < 4}" th:href="@{/products/{seq}(seq=${p.seq})}"
               class="bg-white p-2 flex flex-col justify-between group cursor-pointer border border-gray-100 hover:border-brand transition-colors shadow-sm">
                <div class="aspect-square bg-gray-50 relative overflow-hidden">
                    <img th:src="${p.thumbnailUrl != null ? p.thumbnailUrl : '/images/no-image.png'}" alt="" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
                </div>
                <div class="pt-2 space-y-1">
                    <h4 th:text="${p.productName}" class="text-xs text-gray-700 font-normal line-clamp-2 group-hover:underline">상품명</h4>
                    <p th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')} + '원'" class="text-sm font-black text-brand">549,000원</p>
                </div>
            </a>
        </div>
      </div>
    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    new Swiper('.forcedeal-swiper', {
        slidesPerView: 'auto',
        centeredSlides: true,
        spaceBetween: 16,
        loop: true,
        speed: 600,
        autoplay: { delay: 2800, disableOnInteraction: false }
    });
</script>
<th:block sec:authorize="isAuthenticated()">
    <div th:replace="~{fragments/chat :: chatWidget}"></div>
</th:block>
</body>
</html>
